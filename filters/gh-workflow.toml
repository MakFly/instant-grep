[[filters]]
name = "gh-workflow-run"
match = "^gh (workflow run|run)"
strip_ansi = true
keep_lines = "(Created workflow|queued|in_progress|completed|failure|success|error|Error)"
max_lines = 20

[[filters]]
name = "gh-workflow-list"
match = "^gh workflow (list|view)"
strip_ansi = true
truncate_at = 120
max_lines = 30

[[filters]]
name = "gh-run-watch"
match = "^gh run (watch|view)"
strip_ansi = true
keep_lines = "(\\w+\\s+\\w+|completed|failure|success|in_progress|queued|error)"
max_lines = 30

[[filters]]
name = "gh-run-list"
match = "^gh run list"
strip_ansi = true
truncate_at = 150
max_lines = 20
