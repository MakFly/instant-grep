name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ig-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ig-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ig-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ig-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build Rust binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Stage artifact
        run: |
          mkdir -p release
          cp "target/${{ matrix.target }}/release/ig" "release/${{ matrix.artifact }}"
          chmod +x "release/${{ matrix.artifact }}"

      - name: Sign macOS binary (ad-hoc with stable identifier)
        if: runner.os == 'macOS'
        run: |
          codesign --sign - --force \
            --identifier dev.makfly.ig \
            --options runtime \
            "release/${{ matrix.artifact }}"
          codesign --verify --verbose "release/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare binaries + checksums
        run: |
          mkdir -p release/
          for dir in artifacts/ig-*; do
            cp "$dir"/* release/
          done
          chmod +x release/ig-*
          cd release && sha256sum * > checksums.txt
          echo "=== Checksums ==="
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/ig-linux-x86_64
            release/ig-linux-aarch64
            release/ig-macos-x86_64
            release/ig-macos-aarch64
            release/checksums.txt
