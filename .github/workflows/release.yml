name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ig-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ig-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ig-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ig-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build release
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Sign macOS binary (ad-hoc)
        if: runner.os == 'macOS'
        run: |
          codesign --sign - --force --options runtime \
            target/${{ matrix.target }}/release/ig
          # Verify signature
          codesign --verify --verbose target/${{ matrix.target }}/release/ig

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/ig

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare binaries + checksums
        run: |
          mkdir -p release/
          for dir in artifacts/ig-*; do
            name=$(basename "$dir")
            cp "$dir/ig" "release/$name"
            chmod +x "release/$name"
          done
          cd release && sha256sum * > checksums.txt
          echo "=== Checksums ==="
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/ig-linux-x86_64
            release/ig-linux-aarch64
            release/ig-macos-x86_64
            release/ig-macos-aarch64
            release/checksums.txt

  update-homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Compute SHA256 and update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Compute SHA256 for each binary
          SHA_AARCH64=$(sha256sum artifacts/ig-macos-aarch64/ig | awk '{print $1}')
          SHA_X86_64=$(sha256sum artifacts/ig-macos-x86_64/ig | awk '{print $1}')
          SHA_LINUX=$(sha256sum artifacts/ig-linux-x86_64/ig | awk '{print $1}')

          echo "Version: $VERSION"
          echo "SHA256 aarch64: $SHA_AARCH64"
          echo "SHA256 x86_64:  $SHA_X86_64"
          echo "SHA256 linux:   $SHA_LINUX"

          # Update formula
          sed -i "s/version \".*\"/version \"$VERSION\"/" HomebrewFormula/ig.rb
          sed -i "s/sha256 \".*\" # aarch64/sha256 \"$SHA_AARCH64\" # aarch64/" HomebrewFormula/ig.rb
          sed -i "s/sha256 \".*\" # x86_64/sha256 \"$SHA_X86_64\" # x86_64/" HomebrewFormula/ig.rb
          sed -i "s/sha256 \".*\" # linux/sha256 \"$SHA_LINUX\" # linux/" HomebrewFormula/ig.rb

          cat HomebrewFormula/ig.rb

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HomebrewFormula/ig.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update Homebrew formula to ${GITHUB_REF_NAME}"
          git push origin HEAD:main
