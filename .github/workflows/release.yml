name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ig-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ig-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ig-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/ig

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare binaries
        run: |
          mkdir -p release/
          cp artifacts/ig-linux-x86_64/ig release/ig-linux-x86_64
          cp artifacts/ig-macos-x86_64/ig release/ig-macos-x86_64
          cp artifacts/ig-macos-aarch64/ig release/ig-macos-aarch64
          chmod +x release/*
          cd release && sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/ig-linux-x86_64
            release/ig-macos-x86_64
            release/ig-macos-aarch64
            release/checksums.txt
